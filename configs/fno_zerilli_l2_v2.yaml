# FNO/PINO experiment — accuracy push.
# Inherits the structure of fno_zerilli_l2.yaml; only training-pressure knobs change.
experiment:
  name: fno_zerilli_l2_v2

physics:
  M: 1.0
  l: 2
  potential: zerilli
  pde_sign: standard

domain:
  xmin: -50.0
  xmax: 150.0
  tmin: 0.0
  tmax: 50.0

initial_data:
  A: 1.0
  x0: 4.0
  sigma: 5.0
  velocity_profile: outgoing

fd:
  dx: 0.5
  dt: 0.25
  scheme: rk4_mol

evaluation:
  xq: 2.0

qnm:
  t_start: 10.0
  t_end: 50.0

# ----- Bigger dataset --------------------------------------------------------
dataset:
  seed: 1234
  n_train: 1000   # was 200
  n_val:   100
  n_test:  100
  sweep:
    M_range:     [0.8, 1.2]
    x0_range:    [-10.0, 30.0]
    sigma_range: [3.0, 8.0]
  stride_x: 1
  stride_t: 1

# ----- Slightly larger FNO ---------------------------------------------------
fno:
  modes_t: 32        # was 24
  modes_x: 64        # was 48
  hidden_channels: 96  # was 64
  n_layers: 4
  domain_padding: 0.10
  positional_embedding: grid

# ----- More training pressure + PINO term on ---------------------------------
training:
  seed: 1234
  dtype: float32
  device: auto
  batch_size: 8
  epochs: 500          # was 200
  lr: 1.0e-3
  weight_decay: 1.0e-6
  scheduler: cosine
  grad_clip: 1.0
  loss:
    lam_field: 1.0
    lam_h1:    0.20    # was 0.10 — tightens phase
    lam_ring:  2.0     # was 1.0  — heavier ringdown weight
    lam_pde:   0.05    # NEW — enables PINO physics residual
    lam_bc:    0.0
  log_every: 10
  ckpt_every: 100
  data_path: outputs/fno/fno_zerilli_l2_v2/dataset.npz
  out_dir:   outputs/fno/fno_zerilli_l2_v2

inverse:
  M_init: 1.05
  M_true: 1.00
  noise_sigma: 1.0e-3
  steps: 500
  lr: 1.0e-2
  obs_x: [10.0, 20.0]
