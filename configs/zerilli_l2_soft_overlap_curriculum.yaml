# Zerilli (even parity) l=2 - soft-overlap temporal curriculum
#
# Base: greedy_f03_lbfgs30k (current best RMSD=0.000816)
# Change: replace the hard curriculum stitch with two overlapping windows.
# W1 trains on [0,30], W2 trains on [20,50], and [20,30] is blended.

experiment:
  name: zerilli_l2_soft_overlap_curriculum

physics:
  M: 1.0
  l: 2
  potential: zerilli
  pde_sign: standard

domain:
  xmin: -50.0
  xmax: 150.0
  tmin: 0.0
  tmax: 50.0

initial_data:
  A: 1.0
  x0: 4.0
  sigma: 5.0
  velocity_profile: outgoing

fd:
  dx: 0.2
  dt: 0.1
  scheme: rk4_mol

pinn:
  seed: 1234
  dtype: float64

  Nr: 32000
  Ni: 800
  Nb: 400

  hidden_layers: [80, 40, 20, 10]
  activation: tanh
  output_transform: tanh_bound

  lambda: [100.0, 100.0, 100.0, 1.0, 100.0, 1.0, 1.0]

  tau_est: 0.0

  adaptive_sampling:
    enabled: true
    method: greedy
    period: 1000
    num_candidates: 100000
    greedy_fraction: 0.3
    eval_batch_size: 5000

  adam:
    lr: 1.0e-3
    iters: 10000
    resample_period: 100

  lbfgs:
    iters: 30000
    resample_period: 100

curriculum:
  enabled: true
  mode: soft_overlap
  t_split: 25.0
  overlap_width: 10.0
  overlap_continuity:
    enabled: true
    n_x: 201
    n_t: 11
    weight: 10.0

evaluation:
  xq: 10.0

qnm:
  t_start: 10.0
  t_end: 50.0
  omega_theory: 0.3737
  tau_theory: 11.241
