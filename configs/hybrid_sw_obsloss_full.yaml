# FULL-SCHEDULE QNM-aware observer-whitened loss (promote the de-risk winner).
#
# Identical to hybrid_sw_obsloss_derisk EXCEPT epochs_lbfgs 0 -> 30 (the full
# Adam+L-BFGS schedule used by the hybrid_sw_richardson headline). The Adam-only
# de-risk delivered the BOTH-metrics win (field 0.511%, M4 omega 0.052 == prior,
# M4 tau 0.258) but tau still trails the prior 0.174 / fine 0.063. L-BFGS drives
# the loss (observer term included) to a tighter minimum -> the most likely lever
# to clean up the tail fit and push tau past the prior. This run reports the
# absolute, reportable numbers at the validated weight=1.
#
# Mechanism: the global data term is absolute-MSE, so the observer ringdown tail
# is ~1e-7 of the loss and the FNO reshapes it freely (good field, bad QNM). The
# observer term targets the residual (corr - Phi_R) in the single extraction
# column, time-whitened by min(exp(2 (t-10)/tau), 50) so each e-fold of decay
# matters ~equally. Phi_R is itself QNM-clean, so faithfully reproducing it in
# the fit window restores the mode WITHOUT touching the (intact) global field
# loss -> the BOTH-metrics objective.

experiment:
  name: hybrid_sw_obsloss_full

dataset:
  path: outputs/hybrid/dataset_sw_k4.npz      # k4 coarse prior (channel 0)
  path_k2: outputs/hybrid/dataset_sw_k2.npz   # k2 coarse, sample-aligned
  target_mode: richardson                     # LABEL-FREE Phi_R target

fno:
  modes_t: 16
  modes_x: 32
  hidden_channels: 32
  n_layers: 4
  domain_padding: 0.10
  positional_embedding: grid

train:
  batch_size: 8
  epochs_adam: 100          # match the de-risk / richardson Adam phase
  lr_adam: 1.0e-3
  weight_decay: 1.0e-6
  epochs_lbfgs: 30          # FULL L-BFGS finetune (matches hybrid_sw_richardson)
  lbfgs_max_iter: 20
  lbfgs_chunk_size: 8
  seed: 1234
  device: cuda
  loss:
    data_weight: 1.0        # global field loss UNCHANGED (keeps field accurate)
    physics_weight: 0.0
    anchor_weight: 0.0
    observer:               # QNM-aware envelope-whitened observer-column term
      weight: 1.0           # validated de-risk weight (field-safe)
      xq: 2.0               # extraction radius where the QNM is read
      t_start: 10.0         # weight=1 before ringdown; whiten the tail beyond
      whiten_tau: 11.241    # theory tau: counter e^{-2t/tau} decay of the signal
      whiten_cap: 50.0      # cap the boost so each e-fold ~equal, no runaway

logging:
  log_every: 10
  out_dir: outputs/hybrid/fno_sw_obsloss_full
