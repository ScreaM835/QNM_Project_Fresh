experiment:
  name: hybrid_sw_dataset

physics:
  M: 1.0
  l: 2
  potential: zerilli
  pde_sign: standard

domain:
  xmin: -50.0
  xmax: 150.0
  tmin: 0.0
  tmax: 50.0

initial_data:
  A: 1.0
  x0: 4.0
  sigma: 5.0
  velocity_profile: outgoing

# Base (fine) grid. Coarse grid uses dx = k*dx, dt = k*dt; k is a CLI arg.
fd:
  dx: 0.2
  dt: 0.1
  scheme: rk4_mol
  # Optional higher-order spatial scheme for the CHEAP coarse prior ONLY
  # (the fine field is the FNO target and is left at 2nd order). Validated in
  # scripts/exploration/coarse_stencil_*.py: ~100x (central4) to ~300x (drp7)
  # lower coarse-prior L2, gain holds across the sweep, >=2.3x CFL margin.
  # Uncomment to enable:
  # coarse_space_scheme: drp7     # central4 | central6 | drp7
  # coarse_bc_order: 4

# Sobol sweep ranges for the hybrid dataset.
hybrid_sweep:
  M_range:     [0.8, 1.2]
  x0_range:    [2.0, 6.0]
  sigma_range: [3.0, 7.0]
  n_train: 1000
  n_val:   100
  n_test:  100
  seed:    0
