experiment:
  name: hybrid_sw_k2

# Path to the dataset produced by scripts/build_hybrid_dataset.py
dataset:
  path: outputs/hybrid/dataset_sw_k2.npz

fno:
  modes_t: 16
  modes_x: 32
  hidden_channels: 32
  n_layers: 4
  domain_padding: 0.10
  positional_embedding: grid

train:
  batch_size: 8
  epochs_adam: 100
  lr_adam: 1.0e-3
  weight_decay: 1.0e-6
  epochs_lbfgs: 30
  lbfgs_max_iter: 20
  lbfgs_chunk_size: 8       # samples per chunk in the chunked closure (avoids OOM)
  seed: 1234
  device: cuda          # falls back to cpu in the training script if unavailable

logging:
  log_every: 10
  out_dir: outputs/hybrid/fno_sw_k2
