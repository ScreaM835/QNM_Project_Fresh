# SCRATCH: eval the gate_derisk hybrid model on a single Patel-config sample.
# Mirrors hybrid_sw_gate_derisk.yaml (FNO block byte-identical) but points the
# dataset at the single (M=1,x0=4,sigma=5) sample and a temp out_dir.
experiment:
  name: _patel_single_eval

dataset:
  path: outputs/hybrid/_patel_single_k4.npz
  path_k2: outputs/hybrid/dataset_sw_k2.npz
  target_mode: richardson

fno:
  modes_t: 16
  modes_x: 32
  hidden_channels: 32
  n_layers: 4
  domain_padding: 0.10
  positional_embedding: grid
  output_gate:
    scale: 1.0e-4

train:
  batch_size: 8
  epochs_adam: 100
  lr_adam: 1.0e-3
  weight_decay: 1.0e-6
  epochs_lbfgs: 0
  lbfgs_max_iter: 20
  lbfgs_chunk_size: 8
  seed: 1234
  device: cuda
  loss:
    data_weight: 1.0
    physics_weight: 0.0
    anchor_weight: 0.0

logging:
  log_every: 10
  out_dir: outputs/hybrid/_patel_single_eval
