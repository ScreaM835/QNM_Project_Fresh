# Zerilli (even parity) l=2 — Greedy f=0.3 + wider network
#
# Base: greedy_f03 (current best RMSD=0.000850)
# Change: hidden_layers [80,40,20,10] -> [128,128,128]
#   (~50k params vs ~5k params)
# Motivation: error analysis shows the network struggles to represent
#   both early and late dynamics simultaneously. A wider uniform-width
#   network provides more capacity without aggressive tapering.

experiment:
  name: zerilli_l2_greedy_f03_wide

physics:
  M: 1.0
  l: 2
  potential: zerilli
  pde_sign: standard

domain:
  xmin: -50.0
  xmax: 150.0
  tmin: 0.0
  tmax: 50.0

initial_data:
  A: 1.0
  x0: 4.0
  sigma: 5.0
  velocity_profile: outgoing

fd:
  dx: 0.2
  dt: 0.1
  scheme: rk4_mol

pinn:
  seed: 1234
  dtype: float64

  Nr: 32000
  Ni: 800
  Nb: 400

  hidden_layers: [128, 128, 128]
  activation: tanh
  output_transform: tanh_bound

  lambda: [100.0, 100.0, 100.0, 1.0, 100.0, 1.0, 1.0]

  tau_est: 0.0

  adaptive_sampling:
    enabled: true
    method: greedy
    period: 1000
    num_candidates: 100000
    greedy_fraction: 0.3
    eval_batch_size: 5000

  adam:
    lr: 1.0e-3
    iters: 10000
    resample_period: 100

  lbfgs:
    iters: 15000
    resample_period: 100

evaluation:
  xq: 10.0

qnm:
  t_start: 10.0
  t_end: 50.0
  omega_theory: 0.3737
