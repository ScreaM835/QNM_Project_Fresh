# Zerilli (even parity) l=2 — Curriculum learning (2 windows)
#
# Base: greedy_f03_lbfgs30k (current best RMSD=0.000816)
# Change: Split t=[0,50] into [0,25] and [25,50], train sequentially.
# Window 2 uses trained PINN-1 output as numerical initial conditions.
# Motivation: late-time temporal drift dominates error (41% in t=37.5-50).
#   By restarting training at t=25, the second PINN focuses entirely on the
#   late-time region with fresh ICs from the first PINN.

experiment:
  name: zerilli_l2_curriculum

physics:
  M: 1.0
  l: 2
  potential: zerilli
  pde_sign: standard

domain:
  xmin: -50.0
  xmax: 150.0
  tmin: 0.0
  tmax: 50.0

initial_data:
  A: 1.0
  x0: 4.0
  sigma: 5.0
  velocity_profile: outgoing

fd:
  dx: 0.2
  dt: 0.1
  scheme: rk4_mol

pinn:
  seed: 1234
  dtype: float64

  Nr: 32000
  Ni: 800
  Nb: 400

  hidden_layers: [80, 40, 20, 10]
  activation: tanh
  output_transform: tanh_bound

  lambda: [100.0, 100.0, 100.0, 1.0, 100.0, 1.0, 1.0]

  tau_est: 0.0

  adaptive_sampling:
    enabled: true
    method: greedy
    period: 1000
    num_candidates: 100000
    greedy_fraction: 0.3
    eval_batch_size: 5000

  adam:
    lr: 1.0e-3
    iters: 10000
    resample_period: 100

  lbfgs:
    iters: 30000
    resample_period: 100

curriculum:
  enabled: true
  t_split: 25.0

evaluation:
  xq: 10.0

qnm:
  t_start: 10.0
  t_end: 50.0
  omega_theory: 0.3737
