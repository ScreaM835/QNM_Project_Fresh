# FNO/PINO experiment v5-C — QNM-decoder hypernetwork (BOUNDED omega/tau).
#
# Diff from v5-B (which diverged at ep ~70):
#   - omega / tau now bounded via sigmoid map (was softplus -> unbounded);
#     omega in [0.10, 0.60], tau in [1.0, 50.0].  Closes the omega^4 PDE-
#     residual feedback loop that drove v5-B to NaN.
#   - lam_pde reverted to 0.0 (belt-and-braces; v5-A's original choice).
#     We trust the structural prior (analytic damped-sinusoid tail) to
#     enforce ringdown shape; PINO can be re-enabled in v5-D once we
#     confirm omega-head is well-behaved.
#   - out_dir bumped to v5c so the poisoned v5-B checkpoints can't be
#     auto-resumed.  Dataset is reused from v5 (same physics).
experiment:
  name: fno_zerilli_l2_v5c_qnmhead

physics:
  M: 1.0
  l: 2
  potential: zerilli
  pde_sign: standard

domain:
  xmin: -50.0
  xmax: 150.0
  tmin: 0.0
  tmax: 100.0

initial_data:
  A: 1.0
  x0: 4.0
  sigma: 5.0
  velocity_profile: outgoing

fd:
  dx: 0.5
  dt: 0.25
  scheme: rk4_mol

evaluation:
  xq: 2.0

qnm:
  t_start: 10.0
  t_end:   100.0

dataset:
  seed: 1234
  n_train: 1000
  n_val:   100
  n_test:  100
  sweep:
    M_range:     [0.8, 1.2]
    x0_range:    [-10.0, 30.0]
    sigma_range: [3.0, 8.0]
  stride_x: 1
  stride_t: 1

fno:
  model_type: qnm_head
  modes_t: 64
  modes_x: 64
  hidden_channels: 96
  n_layers: 4
  domain_padding: 0.10
  positional_embedding: grid
  qnm_head:
    n_modes: 2
    t_split: 15.0
    crossover_sharpness: 2.0
    ic_embed_dim: 32
    spatial_hidden: 64
    omega_init: 0.30
    tau_init:  10.0
    # NEW in v5-C: bounded ranges (sigmoid map instead of softplus)
    # Schwarzschild ell=2: n=0 omega=0.3737, n=1 omega=0.3467 — both inside.
    # Schwarzschild ell=2: n=0 tau=11.24, n=1 tau=3.65 — both inside.
    omega_min: 0.10
    omega_max: 0.60
    tau_min:    1.0
    tau_max:   50.0

training:
  seed: 1234
  dtype: float32
  device: auto
  batch_size: 4
  epochs: 500
  lr: 1.0e-3
  weight_decay: 1.0e-6
  scheduler: cosine
  grad_clip: 1.0
  loss:
    lam_field: 1.0
    lam_h1:    0.20
    lam_ring:  2.0
    lam_pde:   0.0            # OFF in v5-C — see header comment.
    lam_bc:    0.0
  log_every: 10
  ckpt_every: 100
  # Reuse the v5 dataset (same physics, same grid) to skip ~70s regen.
  data_path: outputs/fno/fno_zerilli_l2_v5_qnmhead/dataset.npz
  out_dir:   outputs/fno/fno_zerilli_l2_v5c_qnmhead

inverse:
  M_init: 1.05
  M_true: 1.00
  noise_sigma: 1.0e-3
  steps: 500
  lr: 1.0e-2
  obs_x: [10.0, 20.0]
