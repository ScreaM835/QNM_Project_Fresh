experiment:
  name: hybrid_sw_drp7_dataset

physics:
  M: 1.0
  l: 2
  potential: zerilli
  pde_sign: standard

domain:
  xmin: -50.0
  xmax: 150.0
  tmin: 0.0
  tmax: 50.0

initial_data:
  A: 1.0
  x0: 4.0
  sigma: 5.0
  velocity_profile: outgoing

# Base (fine) grid. Coarse grid uses dx = k*dx, dt = k*dt; k is a CLI arg.
# The fine field (FNO regression target) is solved with the default 2nd-order
# scheme; only the CHEAP coarse prior is upgraded to the dispersion-relation-
# preserving DRP7 stencil with a 4th-order boundary closure. Validated in
# scripts/exploration/coarse_stencil_*.py: ~300-500x lower coarse-prior L2,
# gain holds across the sweep, >=2.3x CFL margin at this timestep.
fd:
  dx: 0.2
  dt: 0.1
  scheme: rk4_mol
  coarse_space_scheme: drp7
  coarse_bc_order: 4

# Sobol sweep ranges for the hybrid dataset (identical to hybrid_sw_dataset.yaml
# so the only change vs the baseline experiment is the coarse-prior accuracy).
hybrid_sweep:
  M_range:     [0.8, 1.2]
  x0_range:    [2.0, 6.0]
  sigma_range: [3.0, 7.0]
  n_train: 1000
  n_val:   100
  n_test:  100
  seed:    0
