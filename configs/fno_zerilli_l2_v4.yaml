# FNO/PINO experiment v4 — QNM-targeted loss design.
# Inherits v3 (tmax=100, modes_t=64) but adds two new loss terms aimed
# squarely at the QNM-extraction bottleneck observed in v2:
#   1) loss_obs_slice  — direct L2 on the 1D slice at x = xq=2 that the
#      QNM extractor actually reads.
#   2) loss_time_weighted — field MSE weighted to put ~50x more pressure
#      on ringdown times (t > 15) than on the prompt pulse.
# Also bumps lam_ring 2 -> 10 so the existing ringdown-window term is
# no longer dominated by the early high-amplitude pulse.
experiment:
  name: fno_zerilli_l2_v4

physics:
  M: 1.0
  l: 2
  potential: zerilli
  pde_sign: standard

domain:
  xmin: -50.0
  xmax: 150.0
  tmin: 0.0
  tmax: 100.0

initial_data:
  A: 1.0
  x0: 4.0
  sigma: 5.0
  velocity_profile: outgoing

fd:
  dx: 0.5
  dt: 0.25
  scheme: rk4_mol

evaluation:
  xq: 2.0

qnm:
  t_start: 10.0
  t_end: 100.0

# Same dataset draws as v3 — we reuse v3's dataset.npz to avoid regenerating.
dataset:
  seed: 1234
  n_train: 1000
  n_val:   100
  n_test:  100
  sweep:
    M_range:     [0.8, 1.2]
    x0_range:    [-10.0, 30.0]
    sigma_range: [3.0, 8.0]
  stride_x: 1
  stride_t: 1

fno:
  modes_t: 64
  modes_x: 64
  hidden_channels: 96
  n_layers: 4
  domain_padding: 0.10
  positional_embedding: grid

training:
  seed: 1234
  dtype: float32
  device: auto
  batch_size: 4         # was 8; halved to fit A100-80GB at 401x401
  epochs: 500
  lr: 1.0e-3
  weight_decay: 1.0e-6
  scheduler: cosine
  grad_clip: 1.0
  loss:
    lam_field: 1.0
    lam_h1:    0.20
    lam_ring:  10.0     # was 2.0 — ringdown window weighted up 5x
    lam_pde:   0.05
    lam_bc:    0.0
    # NEW v4 terms ---------------------------------------------------------
    lam_obs:   5.0      # 1-D L2 on the slice at x = xq=2 (the QNM observer)
    lam_tw:    1.0      # time-weighted full-field L2
    tw_t_ramp_start: 10.0   # below this t, w(t)=1
    tw_t_ramp_end:   15.0   # above this t, w(t)=1+tw_beta
    tw_beta:         50.0   # ~50x weight on the ringdown tail
  log_every: 10
  ckpt_every: 100
  # Self-contained dataset (generated by the SLURM script if not present).
  # Same seed + sweep as v3 so the two runs are directly comparable.
  data_path: outputs/fno/fno_zerilli_l2_v4/dataset.npz
  out_dir:   outputs/fno/fno_zerilli_l2_v4

inverse:
  M_init: 1.05
  M_true: 1.00
  noise_sigma: 1.0e-3
  steps: 500
  lr: 1.0e-2
  obs_x: [10.0, 20.0]
