# t=100 variant of hybrid_sw_dataset.yaml. ONLY tmax differs (50 -> 100):
# same domain, grids, initial-data box, Sobol sweep and seed, so the 1200
# parameter draws are IDENTICAL to the t=50 corpus — only the evolution is
# longer. Motivated by the end-time scan (fine-field tau at xq=10 improves
# 2.6% -> 0.8% as t_end extends 50 -> 80, saturating at the ~1e-4 amplitude
# floor near t=85).
experiment:
  name: hybrid_sw_dataset_t100

physics:
  M: 1.0
  l: 2
  potential: zerilli
  pde_sign: standard

domain:
  xmin: -50.0
  xmax: 150.0
  tmin: 0.0
  tmax: 100.0

initial_data:
  A: 1.0
  x0: 4.0
  sigma: 5.0
  velocity_profile: outgoing

# Base (fine) grid. Coarse grid uses dx = k*dx, dt = k*dt; k is a CLI arg.
fd:
  dx: 0.2
  dt: 0.1
  scheme: rk4_mol

# Sobol sweep ranges for the hybrid dataset (identical to t=50 corpus).
hybrid_sweep:
  M_range:     [0.8, 1.2]
  x0_range:    [2.0, 6.0]
  sigma_range: [3.0, 7.0]
  n_train: 1000
  n_val:   100
  n_test:  100
  seed:    0
