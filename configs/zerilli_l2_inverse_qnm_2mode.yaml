# Zerilli (even parity) l=2 — Inverse + 2-MODE QNM extraction
#
# Variant E: combines the winning hyperparameters from variant D (combo)
#   t_ring_min:    18.0
#   lambda_ring:   100.0
#   n_ring_points: 1000
# with a TWO-MODE ringdown template (fundamental + first overtone).
# Adds 4 new learnable parameters with HONEST OFFSETS (matches the
# 20-29%-off convention applied to M, omega0, tau0 in every other
# inverse run; previous version of this file initialised the overtone
# at exact theory which would have made any "recovery" claim circular):
#   omega1_init = 0.28   (~19% below theory 0.3467)
#   tau1_init   = 4.7    (~29% above theory 3.651)
#   A1_init     = 0.25
#   phi1_init   = 0.0
#
# Hypothesis: variant D plateaued at omega ~ 0.30% / tau ~ 15.7% because
# a single damped sinusoid cannot simultaneously fit fundamental and
# overtone in the early ringdown. Adding the overtone should:
#   - allow t_ring_min to move EARLIER without bias
#   - tighten omega
#   - significantly improve tau (which D made worse than baseline)
# Run by:  python scripts/run_pinn_inverse_qnm_2mode.py --config <this>

experiment:
  name: zerilli_l2_inverse_qnm_2mode

physics:
  M: 1.0
  l: 2
  potential: zerilli
  pde_sign: standard

domain:
  xmin: -50.0
  xmax: 150.0
  tmin: 0.0
  tmax: 50.0

initial_data:
  A: 1.0
  x0: 4.0
  sigma: 5.0
  velocity_profile: outgoing

fd:
  dx: 0.2
  dt: 0.1
  scheme: rk4_mol

pinn:
  seed: 1234
  dtype: float64

  Nr: 32000
  Ni: 800
  Nb: 400

  hidden_layers: [80, 40, 20, 10]
  activation: tanh
  output_transform: tanh_bound

  lambda: [100.0, 100.0, 100.0, 1.0, 100.0, 1.0, 1.0]

  tau_est: 0.0

  adaptive_sampling:
    enabled: true
    method: greedy
    period: 1000
    num_candidates: 100000
    greedy_fraction: 0.3
    eval_batch_size: 5000

  adam:
    lr: 1.0e-3
    iters: 10000
    resample_period: 100

  lbfgs:
    iters: 15000
    resample_period: 100

inverse:
  enabled: true
  M_init: 0.8
  noise_level: 0.01
  n_obs: 500
  obs_t_min: 0.0
  obs_t_max: 50.0
  lambda_data: 10.0

ringdown:
  # Fundamental mode
  omega_init: 0.30
  tau_init: 8.0
  A_ring_init: 0.5
  phi0_init: 0.0
  # Overtone mode (offset by ~20-29% from theory, same convention as
  # the fundamental; theory values are 0.3467 and 3.651)
  omega1_init: 0.28      # ~19% below theory 0.3467
  tau1_init: 4.7         # ~29% above theory 3.651
  A1_init: 0.25
  phi1_init: 0.0
  # Loss / window (winning settings from combo)
  lambda_ring: 100.0
  x_obs: 10.0
  t_ring_min: 18.0
  n_ring_points: 1000

evaluation:
  xq: 10.0

qnm:
  t_start: 10.0
  t_end: 50.0
  omega_theory: 0.3737
  tau_theory: 11.241
