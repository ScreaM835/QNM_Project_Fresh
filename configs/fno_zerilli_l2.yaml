# FNO / PINO experiment for Zerilli l=2.
# Learns the operator G_theta : (Phi0(x), Pi0(x), V(x;M,l)) -> Phi(x,t)
# over a family of (M, x0, sigma) parameters.
#
# This config is OPT-IN: it is consumed only by scripts/{generate_fno_dataset,
# train_fno, eval_fno, inverse_fno}.py and does not affect the existing
# FD / PINN pipelines.
experiment:
  name: fno_zerilli_l2

# Base physics / domain / FD options used to (re)generate every training sample.
# Per-sample overrides come from the dataset.sweep block below.
physics:
  M: 1.0
  l: 2
  potential: zerilli
  pde_sign: standard

domain:
  xmin: -50.0
  xmax: 150.0
  tmin: 0.0
  tmax: 50.0

initial_data:
  A: 1.0
  x0: 4.0
  sigma: 5.0
  velocity_profile: outgoing

fd:
  dx: 0.5      # coarser than zerilli_l2 (0.2) so dataset gen is fast
  dt: 0.25     # CFL: dt < dx works fine with V<=1.5 here
  scheme: rk4_mol

evaluation:
  xq: 10.0

qnm:
  t_start: 10.0
  t_end: 50.0

# ---------------------------------------------------------------------------
# Dataset sweep (used only by scripts/generate_fno_dataset.py)
# ---------------------------------------------------------------------------
dataset:
  seed: 1234
  n_train: 200
  n_val:   40
  n_test:  40

  # Sampling ranges. Each sample draws (M, x0, sigma) uniformly.
  sweep:
    M_range:     [0.8, 1.2]
    x0_range:    [-10.0, 30.0]
    sigma_range: [3.0, 8.0]

  # Optional spatial subsampling for the training tensor (FNO works on
  # uniform grids; keep grid uniform when stride > 1).
  stride_x: 1
  stride_t: 1

# ---------------------------------------------------------------------------
# FNO architecture (consumed by src/fno_model.py)
# ---------------------------------------------------------------------------
fno:
  modes_t: 24
  modes_x: 48
  hidden_channels: 64
  n_layers: 4
  domain_padding: 0.10        # critical: Sommerfeld BCs are non-periodic
  positional_embedding: grid

# ---------------------------------------------------------------------------
# Training (consumed by scripts/train_fno.py)
# ---------------------------------------------------------------------------
training:
  seed: 1234
  dtype: float32              # FNO is comfortable in fp32; switch to fp64 if needed
  device: auto                # auto | cpu | cuda

  batch_size: 4
  epochs: 200
  lr: 1.0e-3
  weight_decay: 1.0e-6
  scheduler: cosine           # cosine | step | none
  grad_clip: 1.0

  # Composite loss weights.
  # L = lam_field*L_field + lam_h1*L_H1 + lam_ring*L_ring + lam_pde*L_pde + lam_bc*L_bc
  loss:
    lam_field: 1.0
    lam_h1:    0.10
    lam_ring:  1.0           # extra weight on (x near xq, t in [t_start, t_end])
    lam_pde:   0.0           # set > 0 to enable PINO physics residual
    lam_bc:    0.0           # set > 0 to add Sommerfeld BC residual

  # Logging
  log_every: 10
  ckpt_every: 50

  # Where to read / write
  data_path: outputs/fno/fno_zerilli_l2/dataset.npz
  out_dir:   outputs/fno/fno_zerilli_l2

# ---------------------------------------------------------------------------
# Inverse-problem demo (consumed by scripts/inverse_fno.py)
# ---------------------------------------------------------------------------
inverse:
  M_init: 1.05
  M_true: 1.00
  noise_sigma: 1.0e-3
  steps: 500
  lr: 1.0e-2
  obs_x: [10.0, 20.0]      # observation locations (nearest grid points used)
