# t=100 variant of hybrid_sw_gate_s1em3.yaml. ONLY the dataset paths and
# out_dir differ; model, gate scale, optimiser, batch size and seed are
# identical. Requires the t=100 corpora built from
# configs/hybrid_sw_dataset_t100.yaml (k=4 prior, k=2 Richardson label).
# field = prior + g * FNO,  g = |grad prior| / (|grad prior| + 1e-3).
experiment:
  name: hybrid_sw_gate_s1em3_t100

dataset:
  path: outputs/hybrid/dataset_sw_k4_t100.npz
  path_k2: outputs/hybrid/dataset_sw_k2_t100.npz
  target_mode: richardson

fno:
  modes_t: 16
  modes_x: 32
  hidden_channels: 32
  n_layers: 4
  domain_padding: 0.10
  positional_embedding: grid
  output_gate:
    scale: 1.0e-3

train:
  batch_size: 8
  epochs_adam: 100
  lr_adam: 1.0e-3
  weight_decay: 1.0e-6
  epochs_lbfgs: 0
  lbfgs_max_iter: 20
  lbfgs_chunk_size: 8
  seed: 1234
  device: cuda
  loss:
    data_weight: 1.0
    physics_weight: 0.0
    anchor_weight: 0.0

logging:
  log_every: 10
  out_dir: outputs/hybrid/fno_sw_gate_s1em3_t100
